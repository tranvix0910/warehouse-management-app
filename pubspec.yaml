name: warehouse_management_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_nav_bar: ^5.0.7
  fl_chart: ^1.0.0
  firebase_core: ^3.8.0
  firebase_database: ^11.0.4
  http: ^1.2.2
  top_snackbar_flutter: ^3.3.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  dio: ^5.9.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Export CSV/PDF
  csv: ^6.0.0
  pdf: ^3.11.1
  printing: ^5.13.3
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  open_file: ^3.5.10
  
  # Push Notification
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  
  # Barcode/QR Scanner
  mobile_scanner: ^6.0.2
  
  # Offline Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  connectivity_plus: ^6.1.1
  
  # Image Cache
  cached_network_image: ^3.4.1
  
  # Localization
  flutter_localizations:
    sdk: flutter
  
  # File Import
  file_picker: ^8.1.6
  excel: ^4.0.6
  
  # Markdown Rendering
  flutter_markdown: ^0.7.4+3
  
  # URL Launcher
  url_launcher: ^6.3.1

dev_dependencies:
  # Testing
  mockito: ^5.4.5
  build_runner: ^2.4.14
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  device_preview: ^1.3.1
  tutorial_coach_mark: ^1.3.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/welcome_page/
    - assets/images/sign_in_up_page/

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
